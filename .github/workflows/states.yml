name: State Tests

on:
  workflow_dispatch:

jobs:
  success:
    runs-on: ubuntu-latest
    steps:
      - name: Pass
        run: echo "This job succeeds"

  failure:
    runs-on: ubuntu-latest
    steps:
      - name: Fail
        run: echo "About to fail..." && exit 1

  slow:
    runs-on: ubuntu-latest
    steps:
      - name: Long running
        run: echo "Running for a while..." && sleep 120

  timeout:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Will timeout
        run: echo "This will be canceled by timeout..." && sleep 120

  skipped:
    runs-on: ubuntu-latest
    needs: failure
    steps:
      - name: Never runs
        run: echo "This is skipped because failure failed"
