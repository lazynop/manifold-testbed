pipelines:
  default:
    - step:
        name: Build
        script:
          - echo "Building..." && sleep 5
    - step:
        name: Test
        script:
          - echo "Testing..." && sleep 3
    - step:
        name: Lint
        script:
          - echo "Linting..." && sleep 2
    - step:
        name: Deploy
        script:
          - echo "Deploying..." && sleep 4

  custom:
    states:
      - step:
          name: Success
          script:
            - echo "This job succeeds"
      - step:
          name: Failure
          script:
            - echo "About to fail..." && exit 1
      - step:
          name: Slow
          script:
            - echo "Running for a while..." && sleep 120
